<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- cake base -->
  <rect x="8" y="36" width="48" height="20" rx="5" fill="#D4A843"/>
  <!-- cake middle -->
  <rect x="12" y="26" width="40" height="13" rx="4" fill="#E8BD6A"/>
  <!-- cake top -->
  <rect x="18" y="18" width="28" height="11" rx="3" fill="#F5D48A"/>
  <!-- frosting drips on middle -->
  <path d="M12 28 Q16 24 20 28 Q24 24 28 28 Q32 24 36 28 Q40 24 44 28 Q48 24 52 28" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- candle 1 -->
  <rect x="24" y="9" width="5" height="11" rx="2" fill="#8B5E3C"/>
  <!-- candle 2 -->
  <rect x="35" y="9" width="5" height="11" rx="2" fill="#A67C55"/>
  <!-- flame 1 -->
  <ellipse cx="26.5" cy="7.5" rx="2.5" ry="3.5" fill="#FF9F43"/>
  <ellipse cx="26.5" cy="8.5" rx="1.2" ry="2" fill="#FFD56B"/>
  <!-- flame 2 -->
  <ellipse cx="37.5" cy="7.5" rx="2.5" ry="3.5" fill="#FF7F50"/>
  <ellipse cx="37.5" cy="8.5" rx="1.2" ry="2" fill="#FFD56B"/>
  <!-- dots decoration on base -->
  <circle cx="22" cy="46" r="3" fill="rgba(255,255,255,0.35)"/>
  <circle cx="32" cy="43" r="2.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="42" cy="46" r="3" fill="rgba(255,255,255,0.35)"/>
</svg>
